  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    const PROTO_VERSION = 'v03.76';
    // v01.27 — SignInCard moved to src/components/auth.jsx. AuthGate
    // below routes through window.AuthScreen (the mode router that
    // owns Login / SignUp / Forgot / Reset state). The pre-React
    // boot fallback HTML (`<div class="shell"><div class="card-auth">...`)
    // earlier in this file still uses the .card-auth CSS classes —
    // those are kept for the loading flash before Babel compiles.
    const { getSession, onAuthChange, signOut, loadCurrentProfile } = window.PA_AUTH;

    // v02.21 — Self-healing session getter. getSession() can hang
    // indefinitely when the supabase client has a corrupt in-memory
    // session (e.g. after the client was initialized against stale or
    // malformed localStorage tokens). Without a timeout, the AuthGate
    // stays at "Checking session…" forever. With the timeout, we fall
    // through to sign-in. Additionally, clearStaleSupabaseAuth() forces
    // the supabase client's in-memory session AND localStorage entries
    // clear via the SDK's local-only signOut — without this, the client
    // auto-refreshes the corrupt session in the background and re-
    // establishes the broken state via onAuthChange, defeating the
    // self-heal. Window bumped to 10s: 5s was a false-positive risk on
    // slow mobile networks where a legitimate token refresh can take
    // 5-8s. 10s catches true hangs without punishing slow connections.
    const clearStaleSupabaseAuth = async () => {
      try {
        if (window.supabaseClient?.auth?.signOut) {
          await window.supabaseClient.auth.signOut({ scope: 'local' });
        } else if (typeof localStorage !== 'undefined') {
          const keys = Object.keys(localStorage);
          for (const k of keys) {
            if (k.startsWith('sb-') || k.toLowerCase().includes('supabase')) {
              localStorage.removeItem(k);
            }
          }
        }
        try { console.warn('[AuthGate] cleared stale Supabase auth tokens — user will re-sign-in'); } catch (_) {}
      } catch (_) {}
    };

    const getSessionWithTimeout = async (timeoutMs) => {
      if (!getSession) return null;
      const t = (timeoutMs == null ? 10000 : timeoutMs);
      try {
        const session = await Promise.race([
          getSession(),
          new Promise((_, reject) =>
            setTimeout(() => reject(new Error('getSession timeout')), t)
          ),
        ]);
        return session;
      } catch (e) {
        try { console.warn('[AuthGate] getSession timed out or errored:', e?.message || e); } catch (_) {}
        await clearStaleSupabaseAuth();
        return null;
      }
    };

    // ── App — real shell (sidebar + topbar + routed content) ──
    // v01.27 — PageTitles now stores translation KEYS, not strings.
    // App resolves them through useT() so EN ↔ ES toggles re-render
    // the topbar instantly. Keys use the same paths as the sidebar
    // nav (pages.home.athlete, pages.starts, pages.subAnalysis,
    // etc.) so a single translation source feeds both surfaces.
    const PageTitles = {
      deck:   { a: { titleKey: 'pages.home.athlete', subKey: 'pages.subHome'     },
                c: { titleKey: 'pages.home.coach',   subKey: 'pages.subHome'     } },
      starts: { a: { titleKey: 'pages.starts',       subKey: 'pages.subAnalysis' },
                c: { titleKey: 'pages.starts',       subKey: 'pages.subAnalysis' } },
      turns:  { a: { titleKey: 'pages.turns',        subKey: 'pages.subAnalysis' },
                c: { titleKey: 'pages.turns',        subKey: 'pages.subAnalysis' } },
      races:  { a: { titleKey: 'pages.races',        subKey: 'pages.subAnalysis' },
                c: { titleKey: 'pages.races',        subKey: 'pages.subAnalysis' } },
      board:  { a: { titleKey: 'pages.board',        subKey: 'pages.subRankings' },
                c: { titleKey: 'pages.board',        subKey: 'pages.subRankings' } },
      team:   { a: { titleKey: 'pages.team.athlete', subKey: 'pages.subTeam'     },
                c: { titleKey: 'pages.team.coach',   subKey: 'pages.subTeam'     } },
      // v01.27 — admin queue page. Same title for both personas.
      admin:  { a: { titleKey: 'admin.pageTitle',    subKey: 'admin.pageSub'     },
                c: { titleKey: 'admin.pageTitle',    subKey: 'admin.pageSub'     } },
    };

    const Placeholder = ({ active, persona }) => (
      <div style={{
        padding: 28, borderRadius: 14,
        background: 'var(--bg-2)', border: '1px solid var(--line-soft)',
        color: 'var(--tx-md)', font: '500 13px var(--font-ui)',
        display: 'flex', flexDirection: 'column', gap: 10,
      }}>
        <span className="eyebrow" style={{ color: 'var(--tx-lo)' }}>
          PROTOTYPE · SHELL WIRED
        </span>
        <div className="display" style={{ fontSize: 20, color: 'var(--tx-hi)', letterSpacing: '-0.02em' }}>
          {active} · {persona}
        </div>
        <p style={{ margin: 0, maxWidth: 560, lineHeight: 1.5 }}>
          Sidebar, topbar, and persona switching are live. Real content for this
          page lands in the next steps — analytics + story engine first, then The
          Deck, then Starts / Turns / Races.
        </p>
      </div>
    );

    const App = ({ session, profile, role, isSuperAdmin, isRaceAdmin, onSignOut }) => {
      const [active, setActive] = useState('deck');
      // v03.44 — Cross-tab jump from analysis tabs' "Save to Library"
      // button. When SaveToLibraryButton dispatches
      // pa:open-sessions-clip we flip the active tab here; WebSessions
      // has its own listener that catches the same event and pre-opens
      // the requested clip.
      useEffect(() => {
        const h = () => setActive('sessions');
        window.addEventListener('pa:open-sessions-clip', h);
        return () => window.removeEventListener('pa:open-sessions-clip', h);
      }, []);
      const [scope,  setScope]  = useState(
        typeof document !== 'undefined' ? (document.body.dataset.scope || 'dark') : 'dark'
      );

      // v00.48 — super-admin "view as athlete" state.
      // adminTarget holds { uuid, name } when impersonation is
      // active, null otherwise. Pages prefer this UUID over the
      // v_my_athlete lookup when set.
      const [adminTarget, setAdminTarget] = useState(null);

      // v01.27 — Batch 2 (money path). Fetch the subscription once
      // when the App mounts (and re-fetch on `pa:profile-changed`
      // events — same event the team-onboarding modal dispatches).
      // Drives the PRO badge, trial countdown chip, and the Account
      // modal's Subscription tab. v_my_subscription is RLS-filtered
      // so this read is safe to fire eagerly.
      const [subscription, setSubscription] = useState(null);
      const [accountTab, setAccountTab] = useState(null); // null = closed; 'subscription' / 'profile' / etc = open
      // v01.27 — pending-request count, drives the sidebar Races
      // nav-item badge. Athlete-only (coaches don't have an
      // athlete_uuid → countPending returns 0 cleanly via the
      // existing PA_REQUESTS guard). Re-fetched on
      // pa:profile-changed so the badge updates immediately
      // after a successful upload.
      const [pendingCount, setPendingCount] = useState(0);
      // v01.27 — admin queue badge count. Fetched only when the
      // user has isRaceAdmin (otherwise countAdminPending would
      // return 0 anyway via RLS). Refreshed on pa:profile-changed
      // so updating a request status (which fires the event from
      // WebAdmin) updates the sidebar badge immediately.
      const [adminPendingCount, setAdminPendingCount] = useState(0);
      // v01.30 — pending-team-member badge for the Sidebar + Deck banner.
      // Only fetched when the user is an active coach with a team_uuid
      // (per audit: "ACTIVE coaches" — pending coaches must NOT see
      // pending counts to prevent self-approval).
      const [teamPendingCount, setTeamPendingCount] = useState(0);
      // v01.35 — team ownership flag. Drives the Remove member
      // affordances in RosterRowMenu / CoachesList. Server-side
      // RLS authorizes only owners for those UPDATEs; this client
      // flag just hides the UI so non-owners don't hit a 403.
      const [isTeamOwner, setIsTeamOwner] = useState(false);
      // v03.25 — Lifted BuyAnalysisModal state. Owned at App level
      // so the RequestAnalysisInline button in the sidebar opens the
      // buy modal regardless of which page is active. Mirrors the
      // mobile prototype's v02.18 lift. AthleteDeck retains its own
      // UploadModal (deck-internal flow), but BuyAnalysisModal lives
      // here so any pa:open-modal event with detail.modal === 'buy'
      // reaches a listener no matter where the user is navigated.
      const [buyModal, setBuyModal] = useState(null);
      useEffect(() => {
        let cancelled = false;
        const load = async () => {
          if (!window.PA_REQUESTS) return;
          const subResult = window.PA_REQUESTS.getSubscription
            ? await window.PA_REQUESTS.getSubscription()
            : { data: null };
          if (!cancelled) setSubscription(subResult.data || null);
          const aUuid = profile?.athlete_uuid || null;
          if (aUuid && window.PA_REQUESTS.countPending) {
            const { count } = await window.PA_REQUESTS.countPending(aUuid);
            if (!cancelled) setPendingCount(count || 0);
          } else if (!cancelled) {
            setPendingCount(0);
          }
          // Admin queue count — only when admin.
          if (isRaceAdmin && window.PA_REQUESTS.countAdminPending) {
            const { count } = await window.PA_REQUESTS.countAdminPending();
            if (!cancelled) setAdminPendingCount(count || 0);
          } else if (!cancelled) {
            setAdminPendingCount(0);
          }
          // v01.30 — Team pending badge. Only for active coaches on a
          // team. RLS authorizes the read; non-coaches will get an
          // empty result. The status='active' guard prevents a
          // pending-coach from polling their own pending list.
          const isActiveCoachOnTeam =
            role === 'coach' &&
            profile?.team_uuid &&
            (profile?.membership_status || 'active') === 'active';
          if (isActiveCoachOnTeam && window.PA_TEAMS?.countPendingMembers) {
            const { count } = await window.PA_TEAMS.countPendingMembers(profile.team_uuid);
            if (!cancelled) setTeamPendingCount(count || 0);
          } else if (!cancelled) {
            setTeamPendingCount(0);
          }
          // v01.35 — team ownership check. Only when active coach
          // on a team; otherwise default false.
          if (isActiveCoachOnTeam && window.PA_TEAMS?.checkIsTeamOwner) {
            const { isOwner } = await window.PA_TEAMS.checkIsTeamOwner(
              profile.team_uuid,
              session?.user?.id,
              profile?.coach_uuid || null
            );
            if (!cancelled) setIsTeamOwner(!!isOwner);
          } else if (!cancelled) {
            setIsTeamOwner(false);
          }
        };
        load();
        const onChange = () => { load(); };
        window.addEventListener('pa:profile-changed', onChange);
        return () => {
          cancelled = true;
          window.removeEventListener('pa:profile-changed', onChange);
        };
      }, [session?.user?.id, profile?.athlete_uuid, profile?.team_uuid, role, isRaceAdmin]);

      // Derived state used by Sidebar (PRO badge) + Topbar (chip).
      const isProUser   = window.PA_REQUESTS?.isPro?.(subscription) || false;
      // v02.21 — Super admin and race admin always bypass Pro gates.
      // Internal-use roles need complete access regardless of plan.
      // Downstream components receive isPro={isProForFeatures}, so every
      // gate (compare, video, future Pro features) bypasses for admins
      // without per-gate plumbing. The Account modal still reads
      // subscription state locally, so admin's actual plan displays
      // correctly there — feature-access and billing-display stay
      // separate concerns.
      const isProForFeatures = isProUser || isSuperAdmin || isRaceAdmin;
      const isTrialNow  = window.PA_REQUESTS?.isTrialing?.(subscription) || false;
      const trialDays   = isTrialNow
        ? (window.PA_REQUESTS?.trialDaysLeft?.(subscription) ?? null)
        : null;

      const persona = role === 'coach' ? 'coach' : 'athlete';

      // v03.25 — Source quota state for the lifted BuyAnalysisModal.
      // Called unconditionally per Rules of Hooks. Passes null for
      // coaches/no-athlete profiles; the hook returns idle state in
      // that case. AthleteDeck also calls this same hook with the
      // same key — usePARequests is expected to dedupe internally.
      const buyModalRequestsState = (window.usePARequests || (() => ({})))(profile?.athlete_uuid || null);

      // v03.25 — Buy modal event listener. Fires for pa:open-modal
      // with detail.modal === 'buy'. AthleteDeck retains its own
      // listener for 'upload' (deck-internal flow). Both events flow
      // through the same dispatch surface; each listener filters by
      // intent.
      useEffect(() => {
        const onOpen = (e) => {
          const d = e.detail || {};
          if (d.modal === 'buy') {
            setBuyModal(d);
          } else if (d.modal === null) {
            setBuyModal(null);
          }
        };
        window.addEventListener('pa:open-modal', onOpen);
        return () => window.removeEventListener('pa:open-modal', onOpen);
      }, []);

      // Keep body attribute in sync so tokens.css retints everything.
      useEffect(() => { document.body.dataset.scope = scope; }, [scope]);
      useEffect(() => { document.body.dataset.persona = persona; }, [persona]);
      // Drive a body-level data-impersonating flag — web-shell.jsx
      // uses it to add the orange-tinted top border.
      useEffect(() => {
        document.body.dataset.impersonating = adminTarget ? 'true' : '';
      }, [adminTarget]);

      const toggleScope = () => setScope(s => (s === 'dark' ? 'light' : 'dark'));

      // v01.27 — resolve PageTitles translation keys via useT() so
      // EN ↔ ES toggles re-render the topbar in sync with the rest
      // of the app.
      const tApp = (window.useT || (() => (k) => k))();
      const titleEntry = PageTitles[active] || PageTitles.deck;
      const titleSlot = persona === 'coach' ? titleEntry.c : titleEntry.a;
      const title = tApp(titleSlot.titleKey);
      const sub   = tApp(titleSlot.subKey);

      // Pass a single resolved override down to pages. Pages pull
      // the UUID directly when set; otherwise they fall back to
      // their existing v_my_athlete-based resolution.
      const adminAthleteUuid = adminTarget ? adminTarget.uuid : null;

      return (
        <>
        <PageShell
          active={active}
          onNav={setActive}
          title={title}
          sub={sub}
          scope={scope}
          onToggleScope={toggleScope}
          persona={persona}
          profile={profile}
          role={role}
          fallbackEmail={session.user?.email}
          version={PROTO_VERSION}
          onSignOut={onSignOut}
          impersonating={!!adminTarget}
          onOpenAccount={() => setAccountTab('subscription')}
          isPro={isProForFeatures}
          trialDays={trialDays}
          badges={{ races: pendingCount, admin: adminPendingCount, team: teamPendingCount }}
          extraGroups={
            (isRaceAdmin || isSuperAdmin)
              ? [{
                  labelKey: 'admin.groupAdmin',
                  items: [{ id: 'admin', icon: 'settings', i18nKey: 'admin.navLabel' }],
                }]
              : null
          }
        >
          {/* Impersonation banner.
              v00.48: rendered for super-admins (with team/athlete
              picker for any athlete in the system).
              v00.56: also rendered for coaches whenever
              impersonation is active (set via CoachDeck roster).
              The AdminBar component decides internally which mode
              to render based on the props it receives. */}
          {(isSuperAdmin || adminTarget) && window.AdminBar && (
            <AdminBar
              activeAthleteUuid={adminTarget ? adminTarget.uuid : null}
              activeAthleteName={adminTarget ? adminTarget.name : null}
              onPick={setAdminTarget}
              onClear={() => setAdminTarget(null)}
              superAdmin={isSuperAdmin}
            />
          )}

          {/* v01.60 — Pro upgrade banner for free athletes on the four
              athlete-facing surfaces. Coach Board, Admin, Team views are
              excluded by design. Dismissable per session via sessionStorage.
              Banner click opens Stripe pay-link directly (web flow). */}
          {!isProForFeatures && persona === 'athlete'
            && ['deck', 'races', 'starts', 'turns'].includes(active)
            && window.ProUpgradeBanner && (
              <window.ProUpgradeBanner
                authUserId={session?.user?.id}
                email={session?.user?.email || profile?.email}/>
          )}

          {active === 'deck'
            ? <WebDeck profile={profile} role={role}
                       fallbackEmail={session.user?.email}
                       authUserId={session.user?.id}
                       adminAthleteUuid={adminAthleteUuid}
                       onPickAthlete={setAdminTarget}
                       teamPendingCount={teamPendingCount}
                       onNavigateTeam={() => setActive('team')}/>
            : active === 'races'
            ? (persona === 'coach' && !adminAthleteUuid
                ? <WebTeamRaces profile={profile} onPickAthlete={setAdminTarget}
                                isPro={isProForFeatures}
                                onUpgrade={() => setAccountTab('subscription')}/>
                : <WebRaces session={session} authUserId={session.user?.id} lang="en"
                            adminAthleteUuid={adminAthleteUuid}
                            isPro={isProForFeatures}
                            onUpgrade={() => setAccountTab('subscription')}/>)
            : active === 'starts'
            ? (persona === 'coach' && !adminAthleteUuid
                ? <WebTeamStarts profile={profile} onPickAthlete={setAdminTarget}
                                 isPro={isProForFeatures}
                                 onUpgrade={() => setAccountTab('subscription')}/>
                : <WebStarts session={session} authUserId={session.user?.id} lang="en"
                             adminAthleteUuid={adminAthleteUuid}
                             isPro={isProForFeatures}
                             onUpgrade={() => setAccountTab('subscription')}/>)
            : active === 'turns'
            ? (persona === 'coach' && !adminAthleteUuid
                ? <WebTeamTurns profile={profile} onPickAthlete={setAdminTarget}
                                isPro={isProForFeatures}
                                onUpgrade={() => setAccountTab('subscription')}/>
                : <WebTurns session={session} authUserId={session.user?.id} lang="en"
                            adminAthleteUuid={adminAthleteUuid}
                            isPro={isProForFeatures}
                            onUpgrade={() => setAccountTab('subscription')}/>)
            : active === 'sessions' && window.WebSessions
            /* v03.25 — Video Sessions tab (Phase 1: read-only shell). */
            ? <window.WebSessions session={session} authUserId={session.user?.id} lang="en"
                                  adminAthleteUuid={adminAthleteUuid}
                                  isPro={isProForFeatures}
                                  onUpgrade={() => setAccountTab('subscription')}/>
            : active === 'team' && persona === 'coach' && !adminAthleteUuid
            ? <TeamRosterPage profile={profile} onPickAthlete={setAdminTarget}
                              sessionUserId={session.user?.id || null}
                              isTeamOwner={isTeamOwner}/>
            : active === 'team' && persona === 'athlete' && window.AthleteTeamPage
            ? <window.AthleteTeamPage profile={profile}/>
            : active === 'board'
            ? <WebBoard session={session} authUserId={session.user?.id}
                        role={role} profile={profile}
                        isPro={isProForFeatures}
                        onUpgrade={() => setAccountTab('subscription')}
                        onPickAthlete={(isSuperAdmin || persona === 'coach') ? setAdminTarget : null}/>
            : active === 'admin' && (isRaceAdmin || isSuperAdmin) && window.WebAdmin
            ? <window.WebAdmin/>
            : <Placeholder active={active} persona={persona}/>}
        </PageShell>

        {/* v01.27 — AccountModal renders as a sibling of PageShell
            so its z-index 1500 backdrop fully overlays the topbar
            (z-index 10). Mounts only when accountTab is set; the
            user-card click in Sidebar opens it to 'subscription'.
            Future surfaces can open directly to a different tab by
            setting accountTab to that ID. */}
        {accountTab && window.AccountModal && (
          <window.AccountModal
            initialTab={accountTab}
            profile={profile}
            role={role}
            session={session}
            subscription={subscription}
            scope={scope}
            onToggleScope={toggleScope}
            onClose={() => setAccountTab(null)}
          />
        )}

        {/* v03.25 — Lifted BuyAnalysisModal. Mounted at App level so
            it's reachable from any surface (sidebar RequestAnalysis
            button on any tab, Coach Board upgrade, future entry
            points), not just AthleteDeck. Dev override flags from
            PA_DEV.openBuy({free, pro}) are carried through the event
            detail and applied here. */}
        {buyModal && window.BuyAnalysisModal && (() => {
          const forceFree = buyModal.free === true;
          const forcePro  = buyModal.pro  === true;
          const effectiveIsPro = forceFree
            ? false
            : (forcePro ? true : (buyModalRequestsState?.isPro ?? isProForFeatures ?? false));
          const effectiveQuotaExceeded = forcePro ? true : !!(
            buyModalRequestsState?.quota &&
            !buyModalRequestsState.quota.hasQuota &&
            buyModalRequestsState.quota.status !== 'none'
          );
          return (
            <window.BuyAnalysisModal
              locale={window.PA_I18N?.getLang?.() || 'en'}
              isPro={effectiveIsPro}
              quotaExceeded={effectiveQuotaExceeded}
              authUserId={session?.user?.id}
              email={session?.user?.email || profile?.email}
              onBeforeCheckout={buyModalRequestsState?.armStripeReturn}
              onClose={() => setBuyModal(null)}
            />
          );
        })()}

        {/* v01.61 — Pulse AI FAB. Admin-gated by ai_coach_access
            table (soft launch). Floating bottom-right, mounted
            once at App level so it persists across page navigation. */}
        {window.PulseFab && (
          <window.PulseFab
            authUserId={session.user?.id}
            role={role}
            athleteName={profile?.first_name || profile?.coach_name || null}
          />
        )}
        </>
      );
    };

    // ── Auth gate — decides what to render based on session ──
    const AuthGate = () => {
      const [session,       setSession]      = useState(null);
      const [profile,       setProfile]      = useState(null);
      const [role,          setRole]         = useState(null);
      const [isSuperAdmin,  setIsSuperAdmin] = useState(false);
      const [isRaceAdmin,   setIsRaceAdmin]  = useState(false);
      const [ready,         setReady]        = useState(false);
      // v01.27 — recoveryMode flips true when supabase fires the
      // PASSWORD_RECOVERY event (user clicked the reset link in
      // their email and supabase-js parsed the recovery hash from
      // the URL). While true, AuthScreen is force-rendered in
      // 'reset' mode regardless of the session (the recovery
      // session is only meant for setting a new password, not for
      // accessing the App). Cleared after ResetCard finishes.
      const [recoveryMode,  setRecoveryMode] = useState(false);
      // v01.27 — needsConsent flips true after a successful sign-in
      // if the user has NOT recorded acceptance of CONSENT_VERSION
      // (default 'v1.0'). Backed by check_user_consent RPC. When true,
      // ConsentModal is force-rendered as a blocking overlay above
      // the App and the user must accept to proceed. Cleared after
      // record_user_consent succeeds.
      const [needsConsent,  setNeedsConsent] = useState(false);

      const refreshProfile = async () => {
        const { role, profile } = await loadCurrentProfile();
        setRole(role); setProfile(profile);
        // is_admin RPC is server-side gated; non-admin → returns false.
        if (window.PA_ADMIN) {
          const flags = await window.PA_ADMIN.checkAdmin();
          setIsSuperAdmin(!!flags.isSuperAdmin);
          setIsRaceAdmin(!!flags.isRaceAdmin);
        }
        // v01.27 — check consent acceptance. If the helper isn't on
        // window yet (rare — auth.jsx may still be compiling on the
        // first render after session), default to "no consent" which
        // blocks the App; subsequent refreshProfile calls will pick
        // up the helper once available.
        if (window.PA_AUTH?.checkConsent) {
          const { hasConsent } = await window.PA_AUTH.checkConsent();
          setNeedsConsent(!hasConsent);
        } else {
          setNeedsConsent(true);
        }
      };

      useEffect(() => {
        (async () => {
          // v02.21 — use timeout-wrapped getter so a corrupt session
          // can't strand the user at "Checking session…" forever.
          const s = await getSessionWithTimeout(10000);
          setSession(s);
          if (s) await refreshProfile();
          setReady(true);
        })();
        // v01.27 — listen for PASSWORD_RECOVERY explicitly. Other
        // events (SIGNED_IN, SIGNED_OUT, TOKEN_REFRESHED, USER_UPDATED)
        // route through the standard session refresh.
        //
        // v03.25 — DEFER refreshProfile() out of the callback with
        // setTimeout(0). Supabase-js holds an internal auth lock
        // while firing subscriber callbacks; calling any
        // supabase.from(...) query directly inside the callback
        // deadlocks against that lock. Documented anti-pattern:
        // https://supabase.com/docs/reference/javascript/auth-onauthstatechange
        // The setTimeout pops the call onto the next event-loop
        // tick, after the auth lock releases, so the query can fire.
        const { data: listener } = onAuthChange((event, s) => {
          if (event === 'PASSWORD_RECOVERY') {
            setRecoveryMode(true);
            setSession(s);
            return;
          }
          setSession(s);
          if (s) {
            setTimeout(() => { refreshProfile(); }, 0);
          } else {
            setRole(null); setProfile(null); setIsSuperAdmin(false);
          }
        });
        // v01.27 — `pa:profile-changed` is dispatched by mutation
        // surfaces (currently TeamOnboardingModal in Batch 1c) when
        // the underlying v_my_athlete / v_my_coach row changes
        // outside the auth flow. Re-run refreshProfile so the App
        // sees the new state without a full page reload.
        const onProfileChanged = () => { refreshProfile(); };
        window.addEventListener('pa:profile-changed', onProfileChanged);
        return () => {
          listener?.subscription?.unsubscribe?.();
          window.removeEventListener('pa:profile-changed', onProfileChanged);
        };
      }, []);

      // v01.27 — body is computed once, then wrapped with Toaster +
      // ConfirmHost in a single return. This way the toast/confirm
      // hosts mount once and stay mounted across sign-in / consent /
      // app transitions — their internal state and their
      // window.PA_TOAST / window.PA_CONFIRM hooks survive every
      // body swap.
      let body;
      if (!ready) {
        body = (
          <div className="shell">
            <div className="card-auth">
              <div className="mark">{window.PeakMark ? <window.PeakMark size={24}/> : 'P'}</div>
              <h1>Performance Lab</h1>
              <p className="sub">Checking session…</p>
            </div>
          </div>
        );
      } else if (recoveryMode) {
        // Recovery flow takes priority over both session and no-session
        // branches. Force AuthScreen into 'reset' mode until the user
        // finishes setting their new password.
        const onResetComplete = () => {
          setRecoveryMode(false);
          (async () => {
            // v02.21 — use timeout-wrapped getter (see above).
            const s = await getSessionWithTimeout(10000);
            setSession(s);
            if (s) await refreshProfile();
          })();
        };
        body = window.AuthScreen
          ? <window.AuthScreen forceMode="reset" onResetComplete={onResetComplete}/>
          : (
            <div className="shell">
              <div className="card-auth">
                <div className="mark">{window.PeakMark ? <window.PeakMark size={24}/> : 'P'}</div>
                <h1>Performance Lab</h1>
                <p className="sub">Loading…</p>
              </div>
            </div>
          );
      } else if (!session) {
        // AuthScreen is loaded from src/components/auth.jsx. The
        // fallback render covers the rare case where Babel hasn't
        // compiled auth.jsx yet by the time AuthGate mounts.
        body = window.AuthScreen
          ? <window.AuthScreen onSignedIn={(s) => { setSession(s); refreshProfile(); }}/>
          : (
            <div className="shell">
              <div className="card-auth">
                <div className="mark">{window.PeakMark ? <window.PeakMark size={24}/> : 'P'}</div>
                <h1>Performance Lab</h1>
                <p className="sub">Loading…</p>
              </div>
            </div>
          );
      } else if (needsConsent && window.ConsentModal) {
        // Consent gate sits between "session exists" and "render
        // App". Mirrors live's behavior and uses the same consent_logs
        // table.
        body = <window.ConsentModal
          onAccept={() => setNeedsConsent(false)}
          onSignOut={async () => {
            await signOut();
            setSession(null);
            setNeedsConsent(false);
          }}/>;
      } else {
        body = <App session={session} profile={profile} role={role}
                    isSuperAdmin={isSuperAdmin}
                    isRaceAdmin={isRaceAdmin}
                    onSignOut={async () => { await signOut(); setSession(null); }}/>;
      }

      return (
        <>
          {body}
          {window.Toaster     && <window.Toaster/>}
          {window.ConfirmHost && <window.ConfirmHost/>}
          {window.StuckBanner && <window.StuckBanner/>}
        </>
      );
    };

    // expose for later scripts — set BEFORE render so any component
    // that reads window.PROTO_VERSION on its first mount (e.g. the
    // AuthScreen meta row) sees the value, not undefined.
    window.PROTO_VERSION = PROTO_VERSION;

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AuthGate/>);

    window.ReactRoot = root;
  </script>

</body>
</html>
